name: CI/CD Pipeline

on:
  push:
    branches: [ "sdk" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Docker Image
      run: docker build -t my-app .

    - name: Tag Image
      run: docker tag my-app:latest 142166253229.dkr.ecr.ap-south-1.amazonaws.com/online-quiz-system:latest

    - name: Push to ECR
      run: docker push 142166253229.dkr.ecr.ap-south-1.amazonaws.com/online-quiz-system:latest

    - name: Get ECR Login Password
      id: ecr-token
      run: |
        password=$(aws ecr get-login-password --region ap-south-1)
        echo "password=$password" >> $GITHUB_OUTPUT

    - name: Deploy on EC2 via SSH
      uses: appleboy/ssh-action@v0.1.6
      env:
        ECR_PASSWORD: ${{ steps.ecr-token.outputs.password }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        envs: ECR_PASSWORD
        script: |
          echo $ECR_PASSWORD | docker login --username AWS --password-stdin 142166253229.dkr.ecr.ap-south-1.amazonaws.com
          docker pull 142166253229.dkr.ecr.ap-south-1.amazonaws.com/online-quiz-system:latest
          docker stop online-quiz-system || true
          docker rm online-quiz-system || true
          docker run -d -p 5000:5000 --name online-quiz-system 142166253229.dkr.ecr.ap-south-1.amazonaws.com/online-quiz-system:latest