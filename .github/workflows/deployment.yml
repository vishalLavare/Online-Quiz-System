name: CI/CD Pipeline

on:
  push:
    branches: [ "sdk" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Docker Image
      run: docker build -t my-app .

    - name: Tag Image
      run: docker tag my-app:latest 142166253229.dkr.ecr.ap-south-1.amazonaws.com/online-quiz-system:latest

    - name: Push to ECR
      run: docker push 142166253229.dkr.ecr.ap-south-1.amazonaws.com/online-quiz-system:latest

    - name: Get ECR Login Password
      id: ecr-token
      run: |
        password=$(aws ecr get-login-password --region ap-south-1)
        echo "password=$password" >> $GITHUB_OUTPUT

    - name: Deploy on EC2 via SSH
      uses: appleboy/ssh-action@v0.1.6
      env:
        ECR_PASSWORD: ${{ steps.ecr-token.outputs.password }}
        DB_HOST: "quiz-db"
        DB_USER: "root"
        DB_PASSWORD: "rootpassword"
        DB_NAME: "quiz_db"
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        envs: ECR_PASSWORD,DB_HOST,DB_USER,DB_PASSWORD,DB_NAME
        script: |
          # Ensure Docker is installed and running
          if ! command -v docker &> /dev/null; then
            echo "Docker not found. Installing..."
            sudo apt-get update -y
            sudo apt-get install -y docker.io
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ubuntu
          fi

          # Ensure AWS CLI is installed
          if ! command -v aws &> /dev/null; then
            echo "AWS CLI not found. Installing..."
            sudo apt-get install -y awscli
          fi

          # Create network
          sudo docker network inspect quiz-net >/dev/null 2>&1 || sudo docker network create quiz-net
          
          # Run MySQL if not running
          if ! sudo docker ps -a --format '{{.Names}}' | grep -q '^quiz-db$'; then
            sudo docker run -d --name quiz-db --network quiz-net -e MYSQL_ROOT_PASSWORD=$DB_PASSWORD -e MYSQL_DATABASE=$DB_NAME mysql:8.0
          fi
          
          # Wait for MySQL to be ready
          echo "Waiting for MySQL to start..."
          for i in {1..15}; do
            if sudo docker exec quiz-db mysqladmin ping -h localhost -uroot -p$DB_PASSWORD --silent; then
              echo "MySQL is ready!"
              break
            fi
            echo "MySQL not ready... waiting (attempt $i/15)"
            sleep 3
          done

          # Login to ECR
          echo $ECR_PASSWORD | sudo docker login --username AWS --password-stdin 142166253229.dkr.ecr.ap-south-1.amazonaws.com
          
          # Pull the image
          sudo docker pull 142166253229.dkr.ecr.ap-south-1.amazonaws.com/online-quiz-system:latest

          # Run database initialization and seeding
          echo "Running database initialization and seeding..."
          sudo docker run --rm --network quiz-net \
            -e DB_HOST=$DB_HOST \
            -e DB_USER=$DB_USER \
            -e DB_PASSWORD=$DB_PASSWORD \
            -e DB_NAME=$DB_NAME \
            142166253229.dkr.ecr.ap-south-1.amazonaws.com/online-quiz-system:latest \
            bash -c "python db.py && python seed_india.py"

          # Pull and run the app
          sudo docker stop online-quiz-system || true
          sudo docker rm online-quiz-system || true
          sudo docker run -d -p 5000:5000 \
            --name online-quiz-system \
            --network quiz-net \
            -e DB_HOST=$DB_HOST \
            -e DB_USER=$DB_USER \
            -e DB_PASSWORD=$DB_PASSWORD \
            -e DB_NAME=$DB_NAME \
            142166253229.dkr.ecr.ap-south-1.amazonaws.com/online-quiz-system:latest